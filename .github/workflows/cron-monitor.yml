name: Cloudflare Error Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-errors:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 📦 SISTEMA DE PERSISTENCIA: Intentar recuperar la bandera de caché
      - name: Verificar si es la primera ejecución
        id: cache-check
        uses: actions/cache@v4
        with:
          path: ./first_run_flag
          key: monitor-initial-run-v1

      # 🏷️ ASIGNAR ROL: Si la caché NO se recuperó (cache-hit != true), es la primera vez
      - name: Ejecutar script de monitoreo
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IS_FIRST_RUN: ${{ steps.cache-check.outputs.cache-hit != 'true' }}
        run: node monitor.js

      # 💾 MARCAR BANDERA: Si era la primera vez, crea la carpeta y la guarda en la caché
      - name: Guardar bandera para silenciar futuras pasadas
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./first_run_flag
          echo "done" > ./first_run_flag/flag.txt
